version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: celebratehub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api_gateway:
    build: .
    command: python api_gateway/app.py
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5000
      - DB_HOST=mysql
    volumes:
      - .:/app

  auth_service:
    build: .
    command: python auth_service/app.py
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5001
      - DB_HOST=mysql
    volumes:
      - .:/app

  user_service:
    build: .
    command: python user_service/app.py
    ports:
      - "5002:5002"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5002
      - DB_HOST=mysql
    volumes:
      - .:/app

  vendor_service:
    build: .
    command: python vendor_service/app.py
    ports:
      - "5003:5003"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5003
      - DB_HOST=mysql
    volumes:
      - .:/app

  event_service:
    build: .
    command: python event_service/app.py
    ports:
      - "5004:5004"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5004
      - DB_HOST=mysql
    volumes:
      - .:/app

  booking_service:
    build: .
    command: python booking_service/app.py
    ports:
      - "5005:5005"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5005
      - DB_HOST=mysql
    volumes:
      - .:/app

  payment_service:
    build: .
    command: python payment_service/app.py
    ports:
      - "5006:5006"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5006
      - DB_HOST=mysql
    volumes:
      - .:/app

  review_service:
    build: .
    command: python review_service/app.py
    ports:
      - "5007:5007"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5007
      - DB_HOST=mysql
    volumes:
      - .:/app

  analytics_service:
    build: .
    command: python analytics_service/app.py
    ports:
      - "5008:5008"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVICE_PORT=5008
      - DB_HOST=mysql
    volumes:
      - .:/app

volumes:
  mysql_data:
